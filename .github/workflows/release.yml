name: Release UnitedCraft

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build --no-daemon

      - name: Publish GitHub Release with JAR
        uses: softprops/action-gh-release@v2
        with:
          name: UnitedCraft ${{ github.ref_name }}
          body: |
            ## UnitedCraft ${{ github.ref_name }}

            ### Installation
            1. Download `unitedcraft-*.jar` below
            2. Upload it to your server's `mods/` folder
            3. Restart the server

            ### Requirements
            - Minecraft 1.21.1
            - Fabric Loader 0.15.11+
            - Fabric API

            Built automatically from source.
          files: build/libs/unitedcraft-*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
